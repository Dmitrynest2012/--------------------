<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<title>2D Платформер с Рисованием</title>
<style>
    body { margin:0; background:#f0f0f0; font-family:Arial,sans-serif; }
    #controls { text-align:center; margin:12px; }
    button { margin:5px; padding:9px 14px; font-size:15px; cursor:pointer; border:1px solid #ccc; background:#fff; border-radius:4px; }
    button.active { background:#4caf50; color:white; border-color:#388e3c; }
    button:hover { background:#e8e8e8; }
    button.active:hover { background:#45a049; }
    #importInput { width:360px; padding:9px; font-size:14px; margin:6px; }
    label { margin:0 8px; font-size:15px; }
    input[type=number] { width:90px; padding:6px; font-size:15px; }
    #canvas { border:1px solid #222; background:#fff; display:block; margin:10px auto; cursor:crosshair; box-shadow:0 2px 8px rgba(0,0,0,0.15); }
</style>
</head>
<body>

<div id="controls">
    <button id="toggleGravity">Переключить гравитацию</button>
    <button id="pencilTool">Карандаш</button>
    <button id="eraserTool">Ластик</button>
    <label>Высота уровня:</label>
    <input type="number" id="levelHeight" min="300" max="2000" step="50" value="600">
    <button id="applyHeight">Применить</button>
    <button id="copyLevel">Скопировать уровень</button>
    <button id="importLevel">Импортировать уровень</button>
    <input type="text" id="importInput" placeholder="Вставьте код уровня сюда">
</div>

<canvas id="canvas" width="800" height="600"></canvas>

<script>
// ============================================================================
// Основные переменные
// ============================================================================
const canvas = document.getElementById('canvas');
const ctx = canvas.getContext('2d');

let gravityDir = 1.0;
const GRAVITY = 800;
const JUMP_VELOCITY = 380;
const MOVE_ACCELERATION = 1800;
const COLLISION_DAMPING = 0.65;
const AIR_DRAG = 2.5;
const fixedDt = 1 / 60;
const ERASER_RADIUS = 16;

let ball = { x: 400, y: 100, vx: 0, vy: 0, radius: 20 };
let lines = [];
let drawing = false;
let erasing = false;
let lastX = 0, lastY = 0;
let keys = {};
let accumulator = 0;
let lastTime = performance.now();

// ============================================================================
// Изменение размера холста
// ============================================================================
function resizeCanvas(height) {
    const oldHeight = canvas.height;
    canvas.height = Math.max(300, Math.min(2000, height));

    // Сдвигаем шар пропорционально, чтобы он не "упал" при изменении высоты
    const ratio = canvas.height / oldHeight;
    ball.y *= ratio;

    // Если шар оказался за пределами — ставим его ближе к центру
    if (ball.y < ball.radius * 2) ball.y = ball.radius * 2;
    if (ball.y > canvas.height - ball.radius * 2) ball.y = canvas.height - ball.radius * 2;

    redraw();
}

document.getElementById('applyHeight').onclick = () => {
    const h = parseInt(document.getElementById('levelHeight').value, 10);
    if (!isNaN(h)) resizeCanvas(h);
};

// ============================================================================
// Коллизии
// ============================================================================
function distanceToSegment(p, a, b) {
    const dx = b.x - a.x, dy = b.y - a.y;
    const len2 = dx*dx + dy*dy;
    if (len2 === 0) return Math.hypot(p.x-a.x, p.y-a.y);
    let t = ((p.x-a.x)*dx + (p.y-a.y)*dy) / len2;
    t = Math.max(0, Math.min(1, t));
    const px = a.x + t*dx, py = a.y + t*dy;
    return Math.hypot(p.x-px, p.y-py);
}

function getLineCollisionInfo(c, a, b) {
    const dx = b.x - a.x, dy = b.y - a.y;
    const len2 = dx*dx + dy*dy;
    if (len2 === 0) return {collides:false};
    let t = ((c.x-a.x)*dx + (c.y-a.y)*dy) / len2;
    t = Math.max(0, Math.min(1, t));
    const px = a.x + t*dx, py = a.y + t*dy;
    const dxp = c.x - px, dyp = c.y - py;
    const dist = Math.hypot(dxp, dyp);
    if (dist > c.radius + 0.001) return {collides:false};
    return {collides:true, dist, nx:dxp/dist||0, ny:dyp/dist||0};
}

function resolveCollisions() {
    for (let iter = 0; iter < 5; iter++) {
        let any = false;
        for (const line of lines) {
            for (let i = 0; i < line.length-1; i++) {
                const info = getLineCollisionInfo(ball, line[i], line[i+1]);
                if (info.collides) {
                    any = true;
                    const pen = ball.radius - info.dist;
                    ball.x += info.nx * pen;
                    ball.y += info.ny * pen;
                    const dot = ball.vx*info.nx + ball.vy*info.ny;
                    if (dot < 0) {
                        ball.vx -= 2*dot*info.nx;
                        ball.vy -= 2*dot*info.ny;
                    }
                    ball.vx *= COLLISION_DAMPING;
                    ball.vy *= COLLISION_DAMPING;
                }
            }
        }
        if (!any) break;
    }
}

function isOnGround() {
    const down = gravityDir > 0 ? 1 : -1;
    const footY = ball.y + down * (ball.radius + 4);
    const foot = {x: ball.x, y: footY};

    let minD = Infinity;
    for (const line of lines) {
        for (let i = 0; i < line.length-1; i++) {
            minD = Math.min(minD, distanceToSegment(foot, line[i], line[i+1]));
        }
    }

    const boundaryDist = down > 0
        ? canvas.height - footY
        : footY;

    return Math.min(minD, boundaryDist) < 9;
}

// ============================================================================
// Физика
// ============================================================================
function updatePhysics(dt) {
    if (keys.a || keys.ф) ball.vx -= MOVE_ACCELERATION * dt;
    if (keys.d || keys.в) ball.vx += MOVE_ACCELERATION * dt;

    const down = gravityDir > 0 ? 1 : -1;
    if ((keys.w || keys.ц) && isOnGround()) {
        ball.vy = -down * JUMP_VELOCITY;
    }

    const drag = 1 - AIR_DRAG * dt;
    ball.vx *= drag;
    ball.vy *= drag;

    ball.vy += gravityDir * GRAVITY * dt;

    ball.x += ball.vx * dt;
    ball.y += ball.vy * dt;

    resolveCollisions();

    // Границы
    if (ball.x < ball.radius)         { ball.x = ball.radius;         ball.vx *= -0.4; }
    if (ball.x > canvas.width-ball.radius)  { ball.x = canvas.width-ball.radius;  ball.vx *= -0.4; }
    if (ball.y < ball.radius)         { ball.y = ball.radius;         ball.vy *= -0.4; }
    if (ball.y > canvas.height-ball.radius) { ball.y = canvas.height-ball.radius; ball.vy *= -0.4; }
}

// ============================================================================
// Отрисовка
// ============================================================================
function redraw() {
    ctx.clearRect(0,0,canvas.width,canvas.height);

    ctx.strokeStyle = "#000";
    ctx.lineWidth = 6;
    ctx.lineCap = "round";
    ctx.lineJoin = "round";

    for (const line of lines) {
        if (line.length < 2) continue;
        ctx.beginPath();
        ctx.moveTo(line[0].x, line[0].y);
        for (let i = 1; i < line.length; i++) {
            ctx.lineTo(line[i].x, line[i].y);
        }
        ctx.stroke();
    }

    ctx.fillStyle = "#e53935";
    ctx.shadowColor = "rgba(0,0,0,0.5)";
    ctx.shadowBlur = 12;
    ctx.shadowOffsetX = 4;
    ctx.shadowOffsetY = 4;
    ctx.beginPath();
    ctx.arc(ball.x, ball.y, ball.radius, 0, Math.PI*2);
    ctx.fill();
    ctx.shadowBlur = 0;
}

// ============================================================================
// Ластик
// ============================================================================
function segmentIntersectsCircle(a, b, c, r) {
    const dx = b.x - a.x, dy = b.y - a.y;
    const len2 = dx*dx + dy*dy;
    if (len2 === 0) return Math.hypot(c.x-a.x, c.y-a.y) <= r;
    let t = ((c.x-a.x)*dx + (c.y-a.y)*dy) / len2;
    t = Math.max(0, Math.min(1,t));
    const px = a.x + t*dx, py = a.y + t*dy;
    return Math.hypot(c.x-px, c.y-py) <= r;
}

function eraseNear(mx, my) {
    const c = {x:mx, y:my};
    lines = lines.map(line => {
        if (line.length < 2) return line;
        const kept = [line[0]];
        for (let i = 1; i < line.length; i++) {
            if (!segmentIntersectsCircle(line[i-1], line[i], c, ERASER_RADIUS)) {
                kept.push(line[i]);
            }
        }
        return kept;
    }).filter(l => l.length >= 2);
    redraw();
}

// ============================================================================
// Игровой цикл
// ============================================================================
function gameLoop(now) {
    const frame = Math.min((now - lastTime)/1000, 0.05);
    lastTime = now;
    accumulator += frame;

    while (accumulator >= fixedDt) {
        updatePhysics(fixedDt);
        accumulator -= fixedDt;
    }

    redraw();
    requestAnimationFrame(gameLoop);
}

// ============================================================================
// Ввод
// ============================================================================
window.addEventListener('keydown', e => keys[e.key.toLowerCase()] = true);
window.addEventListener('keyup',   e => keys[e.key.toLowerCase()] = false);

function startDraw(e) {
    if (e.button !== 0) return;
    const r = canvas.getBoundingClientRect();
    lastX = e.clientX - r.left;
    lastY = e.clientY - r.top;

    if (erasing) eraseNear(lastX, lastY);
    else if (drawing) {
        lines.push([{x:lastX, y:lastY}]);
        redraw();
    }
}

function onMove(e) {
    if ((!drawing && !erasing) || !(e.buttons & 1)) return;
    const r = canvas.getBoundingClientRect();
    const x = e.clientX - r.left;
    const y = e.clientY - r.top;

    if (erasing) eraseNear(x, y);
    else if (drawing && lines.length > 0) {
        const ln = lines[lines.length-1];
        const prev = ln[ln.length-1];
        if (Math.hypot(x-prev.x, y-prev.y) > 2) {
            ln.push({x, y});
            redraw();
        }
    }

    lastX = x; lastY = y;
}

canvas.addEventListener('mousedown', startDraw);
canvas.addEventListener('mousemove', onMove);
canvas.addEventListener('mouseup',   ()=>{});
canvas.addEventListener('mouseout',  ()=>{});

// ============================================================================
// Интерфейс
// ============================================================================
document.getElementById('toggleGravity').onclick = () => gravityDir *= -1;

document.getElementById('pencilTool').onclick = function(){
    drawing = true; erasing = false;
    document.querySelectorAll('#controls button[id$="Tool"]').forEach(b=>b.classList.remove('active'));
    this.classList.add('active');
};

document.getElementById('eraserTool').onclick = function(){
    erasing = true; drawing = false;
    document.querySelectorAll('#controls button[id$="Tool"]').forEach(b=>b.classList.remove('active'));
    this.classList.add('active');
};

document.getElementById('copyLevel').onclick = () => {
    const data = {
        height: canvas.height,
        lines: lines
    };
    const json = JSON.stringify(data);
    const code = btoa(json);
    navigator.clipboard.writeText(code)
        .then(()=>alert("Уровень скопирован!"))
        .catch(()=>prompt("Скопируйте код:", code));
};

document.getElementById('importLevel').onclick = () => {
    const code = document.getElementById('importInput').value.trim();
    if (!code) return;
    try {
        const json = atob(code);
        const data = JSON.parse(json);
        lines = data.lines || [];
        const h = data.height || 600;
        document.getElementById('levelHeight').value = h;
        resizeCanvas(h);
        redraw();
        alert("Уровень загружен");
    } catch(e) {
        alert("Неверный код уровня");
    }
};

// ============================================================================
// Старт
// ============================================================================
requestAnimationFrame(gameLoop);
</script>
</body>
</html>
